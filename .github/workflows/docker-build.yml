name: Docker Build and Push

on:
  push:
    branches: [ "main" ]  # 当推送到 main 分支时触发
  pull_request:
    branches: [ "main" ]  # 当对 main 分支发起 PR 时触发

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
    
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          # 在 GitHub 仓库的 Settings -> Secrets and variables -> Actions 里配置：
          # DOCKERHUB_USERNAME = gzc888
          # DOCKERHUB_TOKEN    = 你的 Docker Hub Access Token / 密码
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
    
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
    
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            gzc888/you2apidocker:latest
            gzc888/you2apidocker:${{ github.sha }}
          cache-from: type=registry,ref=gzc888/you2apidocker:buildcache
          cache-to: type=registry,ref=gzc888/you2apidocker:buildcache,mode=max
